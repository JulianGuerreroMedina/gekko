name: gekko

services:
  php:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: gekko-php
    restart: unless-stopped
    working_dir: /var/www/app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      TZ: America/Merida
      APP_ENV: local
    volumes:
      - ../:/var/www/app:ro
      - ../storage:/var/www/app/storage:rw
    networks:
      - gekko_net
      - dev_shared_net

  nginx:
    image: nginx:alpine
    container_name: gekko-nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "8011:80"
      - "8446:443"
    volumes:
      - ../:/var/www/app:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

    networks:
      - gekko_net

networks:
  gekko_net:
    driver: bridge

  dev_shared_net:
    external: true
    name: dev_shared_net
