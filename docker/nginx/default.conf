server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    root /var/www/app/public;
    index index.php index.html;

    ssl_certificate     /etc/nginx/certs/dev.crt;
    ssl_certificate_key /etc/nginx/certs/dev.key;

    client_max_body_size 64M;
    charset utf-8;

    # Ocultar archivos sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* ^/(?:\.env|\.git)(?:/|$) {
        deny all;
        return 403;
    }

    # Bloqueos defensivos
    location ^~ /private/ {
        deny all;
        return 403;
    }

    location ^~ /storage/ {
        deny all;
        return 403;
    }

    location ^~ /media/ {
        alias /var/www/app/storage/media/;
        access_log off;
        expires 7d;
        try_files $uri =404;
    }


    location ^~ /doctos/ {
        deny all;
        return 403;
    }

    location ~ ^/core\.js/(.*)$ {
        rewrite ^/core\.js/(.*)$ /assets/core.js/$1 last;
    }

    location ~ ^/core\.icons/(.*)$ {
        rewrite ^/core\.icons/(.*)$ /assets/core.icons/$1 last;
    }

    location ~ ^/(js|css|img|chart)/(.*)$ {
        rewrite ^/(js|css|img|chart)/(.*)$ /assets/$1/$2 last;
    }



    # Assets compartidos externos (opcional)
    # Actívalos si agregas también los mounts en docker-compose.yml
    # location /shared/core.js/ {
    #     alias /var/www/shared/core.js/;
    #     access_log off;
    #     expires 7d;
    # }
    #
    # location /shared/my_icons/ {
    #     alias /var/www/shared/my_icons/;
    #     access_log off;
    #     expires 7d;
    # }

    # Home
    location = / {
        rewrite ^ /index.php last;
    }

    # Front controller compatible con ?url=...
    location / {
        try_files $uri $uri/ @router;
    }

    location @router {
        rewrite ^/(.*)$ /index.php?url=$1&$args last;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param HTTPS on;
        fastcgi_pass php:9000;
    }
}
